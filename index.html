  <!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>欢迎大姑父回家</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{
            overflow: hidden;
            background: #000;
            height: 100vh;
        }
        canvas{
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        .text-box{
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%,-50%);
            font-size: 48px;
            color: #ffd700;
            font-weight: bold;
            text-shadow: 0 0 15px #ff6600,0 0 30px #ff3300;
            opacity: 0;
            transition: opacity 1s ease;
            letter-spacing: 6px;
        }
        .show-text{
            opacity: 1;
        }
    </style>
</head>
<body>
    <canvas id="fireCanvas"></canvas>
    <div class="text-box">欢迎大姑父回家</div>

    <script>
        const canvas = document.getElementById('fireCanvas');
        const ctx = canvas.getContext('2d');
        const textDom = document.querySelector('.text-box');
        let w,h;
        let fireList = [];
        let boomList = [];
        let showFlag = false;

        // 适配画布尺寸
        function resize(){
            w = window.innerWidth;
            h = window.innerHeight;
            canvas.width = w;
            canvas.height = h;
        }
        resize();
        window.addEventListener('resize',resize);

        // 烟花升空粒子
        class Fire{
            constructor(){
                this.x = Math.random() * w;
                this.y = h;
                this.vy = -Math.random()*4 -3;
                this.vx = Math.random()*2 -1;
                this.r = 3;
                this.color = `hsl(${Math.random()*360},100%,60%)`;
                this.boomH = Math.random()*h*0.4 + h*0.2;
            }
            update(){
                this.x += this.vx;
                this.y += this.vy;
                if(this.y <= this.boomH){
                    this.boom();
                    return false;
                }
                return true;
            }
            draw(){
                ctx.beginPath();
                ctx.arc(this.x,this.y,this.r,0,Math.PI*2);
                ctx.fillStyle = this.color;
                ctx.fill();
            }
            boom(){
                // 生成爆炸火花
                for(let i=0;i<80;i++){
                    boomList.push(new Boom(this.x,this.y,this.color));
                }
                // 烟花炸开后显示文字
                if(!showFlag){
                    showFlag = true;
                    textDom.classList.add('show-text');
                }
            }
        }

        // 爆炸火花粒子
        class Boom{
            constructor(x,y,color){
                this.x = x;
                this.y = y;
                const angle = Math.random()*Math.PI*2;
                const speed = Math.random()*6 +2;
                this.vx = Math.cos(angle)*speed;
                this.vy = Math.sin(angle)*speed;
                this.r = Math.random()*2 +1;
                this.color = color;
                this.alpha = 1;
            }
            update(){
                this.x += this.vx;
                this.y += this.vy;
                this.vy += 0.05;
                this.alpha -= 0.02;
                return this.alpha > 0;
            }
            draw(){
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.beginPath();
                ctx.arc(this.x,this.y,this.r,0,Math.PI*2);
                ctx.fillStyle = this.color;
                ctx.fill();
                ctx.restore();
            }
        }

        // 定时发射烟花
        setInterval(()=>{
            fireList.push(new Fire());
        },600);

        // 动画循环
        function animate(){
            ctx.fillStyle = 'rgba(0,0,0,0.15)';
            ctx.fillRect(0,0,w,h);

            fireList = fireList.filter(item=>{
                item.draw();
                return item.update();
            });

            boomList = boomList.filter(item=>{
                item.draw();
                return item.update();
            });
            requestAnimationFrame(animate);
        }
        animate();
    </script>
</body>
</html>
    
  </body>
  
</html>
